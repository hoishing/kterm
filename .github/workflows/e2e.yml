name: E2E UI Tests

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Test class or class/method (e.g. TabCreationTests or TabCreationTests/testNewTab). Leave empty to run all."
        required: false
        default: ""
      ref:
        description: "Branch or SHA to test"
        required: false
        default: ""
      test_timeout:
        description: "Per-test timeout in seconds"
        required: false
        default: "120"

concurrency:
  group: e2e-${{ inputs.ref || github.ref_name }}-${{ inputs.test_filter }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - name: Cache Zig toolchain
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .zig-toolchain
          key: zig-toolchain-${{ runner.arch }}-${{ hashFiles('scripts/build-ghosttykit.sh') }}

      - name: Use zsh as the runner's login shell
        # libghostty refuses to inject OSC 7 shell integration into Apple's
        # own /bin/bash (it disables the ENV-based POSIX startup path Ghostty
        # relies on), so it silently no-ops for it. GitHub's macOS runner
        # account defaults to /bin/bash; real kterm users are on zsh (macOS's
        # default shell since Catalina), which libghostty integrates fine.
        run: sudo chsh -s /bin/zsh "$(whoami)"

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build GhosttyKit.xcframework
        run: ./scripts/build-ghosttykit.sh

      - name: Create virtual display
        run: |
          set -euo pipefail
          clang -framework Foundation -framework CoreGraphics \
            -o /tmp/create-virtual-display scripts/create-virtual-display.m

          VDISPLAY_READY="$RUNNER_TEMP/kterm-virtual-display.ready"
          VDISPLAY_ID_PATH="$RUNNER_TEMP/kterm-virtual-display.id"
          VDISPLAY_LOG="$RUNNER_TEMP/kterm-virtual-display.log"
          rm -f "$VDISPLAY_READY" "$VDISPLAY_ID_PATH" "$VDISPLAY_LOG"

          /tmp/create-virtual-display \
            --ready-path "$VDISPLAY_READY" \
            --display-id-path "$VDISPLAY_ID_PATH" \
            >"$VDISPLAY_LOG" 2>&1 &
          echo "VDISPLAY_PID=$!" >> "$GITHUB_ENV"

          for _ in $(seq 1 100); do
            if [ -s "$VDISPLAY_READY" ] && [ -s "$VDISPLAY_ID_PATH" ]; then
              break
            fi
            sleep 0.1
          done
          if [ ! -s "$VDISPLAY_READY" ]; then
            echo "Timed out waiting for virtual display readiness" >&2
            cat "$VDISPLAY_LOG" >&2 || true
            exit 1
          fi
          echo "Virtual display ready: $(cat "$VDISPLAY_ID_PATH")"

      - name: Run UI tests
        id: tests
        env:
          TEST_FILTER: ${{ inputs.test_filter }}
          TEST_TIMEOUT: ${{ inputs.test_timeout || '120' }}
        run: |
          # No -u: GitHub's macOS runner /bin/bash is 3.2, which treats
          # expanding an empty array under `set -u` as an unbound variable.
          set -eo pipefail

          ONLY_TESTING=()
          if [ -n "$TEST_FILTER" ]; then
            ONLY_TESTING=(-only-testing:"ktermUITests/$TEST_FILTER")
          fi

          # kterm's own signing identity (Apple Development, team-scoped) only
          # exists in the maintainer's local keychain. CI has no cert, and
          # kterm.entitlements has no sandbox/capabilities, so ad-hoc signing
          # is sufficient to build and run the app for UI testing.
          SIGNING_OVERRIDES=(
            CODE_SIGN_IDENTITY=-
            CODE_SIGN_STYLE=Manual
            DEVELOPMENT_TEAM=
            CODE_SIGNING_REQUIRED=NO
            CODE_SIGNING_ALLOWED=NO
          )

          # XCUITest's control channel (testmanagerd) must run inside the
          # console user's GUI bootstrap session. GitHub's macOS runners
          # already auto-login the runner user, so this is normally a no-op;
          # it's a defensive fallback in case that ever changes.
          RUN_XCODEBUILD=(env)
          GUI_USER="$(stat -f %Su /dev/console 2>/dev/null || true)"
          if [ -n "$GUI_USER" ] && [ "$GUI_USER" != "root" ] && [ "$GUI_USER" != "$(id -un)" ] \
            && GUI_UID="$(id -u "$GUI_USER" 2>/dev/null)" && sudo -n true 2>/dev/null; then
            echo "Hopping into console user '$GUI_USER' ($GUI_UID) GUI bootstrap"
            RUN_XCODEBUILD=(sudo -n launchctl asuser "$GUI_UID" sudo -n -u "$GUI_USER" /usr/bin/env)
          fi

          set +e
          "${RUN_XCODEBUILD[@]}" xcodebuild test \
            -project kterm.xcodeproj -scheme kterm \
            -destination "platform=macOS" \
            -maximum-test-execution-time-allowance "$TEST_TIMEOUT" \
            "${SIGNING_OVERRIDES[@]}" \
            "${ONLY_TESTING[@]}" \
            2>&1 | tee /tmp/xcodebuild-e2e.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "=== Summary ==="
          grep -E "(Test Suite|Executed|error:|FAIL|PASS)" /tmp/xcodebuild-e2e.log | tail -30 || true
          exit "$EXIT_CODE"

      - name: Stop virtual display
        if: always()
        run: kill "$VDISPLAY_PID" 2>/dev/null || true

      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: xcresult
          path: ~/Library/Developer/Xcode/DerivedData/kterm-*/Logs/Test/*.xcresult
          if-no-files-found: warn
