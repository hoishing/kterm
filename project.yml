name: kterm
options:
  bundleIdPrefix: com.kterm
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  kterm:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
      # Bundled verbatim as Contents/Resources/ghostty so libghostty can find
      # the shell-integration scripts (enables OSC 7 pwd / title reporting).
      - path: Resources/ghostty
        type: folder
      # The terminfo DB must sit next to the resources dir (Contents/Resources)
      # because libghostty sets the shell's TERMINFO to <resources>/../terminfo
      # and TERM to xterm-ghostty; without it the line editor breaks.
      - path: Resources/terminfo
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kterm.app
        PRODUCT_NAME: kterm
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_ENTITLEMENTS: Resources/kterm.entitlements
        # Find GhosttyKit.xcframework at the repo root.
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)"
        # libghostty is a static library: link it plus every system framework
        # and library it depends on (it carries no autolink hints).
        OTHER_LDFLAGS:
          - "-lc++"
          - "-framework"
          - "Metal"
          - "-framework"
          - "MetalKit"
          - "-framework"
          - "QuartzCore"
          - "-framework"
          - "CoreText"
          - "-framework"
          - "CoreGraphics"
          - "-framework"
          - "CoreVideo"
          - "-framework"
          - "IOSurface"
          - "-framework"
          - "IOKit"
          - "-framework"
          - "Carbon"
          - "-framework"
          - "ApplicationServices"
          - "-framework"
          - "CoreServices"
          - "-framework"
          - "AudioToolbox"
          - "-framework"
          - "UniformTypeIdentifiers"
    dependencies:
      # Static xcframework: link, do not embed.
      - framework: GhosttyKit.xcframework
        embed: false

  ktermUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ktermUITests
    settings:
      base:
        PRODUCT_NAME: ktermUITests
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: kterm
    dependencies:
      - target: kterm

schemes:
  kterm:
    build:
      targets:
        kterm: all
        ktermUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ktermUITests
